<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
        }
        h1 { color: #333; }
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            box-sizing: border-box;
        }
        button {
            margin-top: 10px;
            padding: 10px 24px;
            font-size: 1rem;
            background-color: #0062cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #004a99; }
        #output {
            margin-top: 20px;
            padding: 16px;
            background: white;
            border-left: 4px solid #0062cc;
            border-radius: 4px;
            min-height: 40px;
            font-size: 1rem;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Emotion Detector</h1>
    <p>Enter a statement below and click <strong>Analyze</strong> to detect the emotions expressed.</p>
    <textarea id="textInput" placeholder="Type your text here..."></textarea>
    <br>
    <button onclick="analyzeEmotion()">Analyze</button>

    <div id="output">Results will appear here.</div>

    <script>
        async function analyzeEmotion() {
            const text = document.getElementById('textInput').value.trim();
            const outputDiv = document.getElementById('output');

            if (!text) {
                outputDiv.innerHTML = '<em>Please enter some text before analyzing.</em>';
                return;
            }

            outputDiv.innerHTML = 'Analyzing...';

            try {
                const response = await fetch(
                    '/emotionDetector?textToAnalyze=' + encodeURIComponent(text)
                );
                const result = await response.text();
                outputDiv.innerHTML = result;
            } catch (error) {
                outputDiv.innerHTML = 'An error occurred. Please try again.';
            }
        }
    </script>
</body>
</html>
